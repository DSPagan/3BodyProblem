name: Deploy web demo

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build WebAssembly bundle
        # Stage only the code that has to ship so the bundle stays tiny
        # (no venv, GIF, tests, ...).
        run: |
          mkdir -p three-body
          cp main.py three-body/
          cp -r threebody three-body/
          pygbag --build --title "The Three-Body Problem" three-body/main.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: three-body/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
